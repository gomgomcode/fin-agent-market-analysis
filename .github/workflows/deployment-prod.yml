name: Deploy to Self-Hosted Runner

on:
  push:
    branches: [ dev, develop ]
#   workflow_dispatch:
#     inputs:
#       environment:
#         description: '배포 환경 선택'
#         required: true
#         default: 'production'
#         type: choice
#         options:
#           - production
#           - staging

jobs:
  deploy:
    name: Deploy to Self-Hosted Runner
    runs-on: finlab-1
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install required tools
        run: |
          # jq와 curl이 설치되어 있는지 확인하고 없으면 설치
          if ! command -v jq &> /dev/null; then
            echo "jq가 설치되어 있지 않습니다. 설치 중..."
            sudo dnf install -y jq || sudo yum install -y jq
          fi
          
          if ! command -v curl &> /dev/null; then
            echo "curl이 설치되어 있지 않습니다. 설치 중..."
            sudo dnf install -y curl || sudo yum install -y curl
          fi
          
          echo "필요한 도구들이 설치되었습니다."
          jq --version
          curl --version
      
      - name: Set up environment variables
        run: |
          cat > .env << EOF
          PRODUCTION=${{ vars.PRODUCTION }}
          APISERVER_PORT_EXTERNAL=8000
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL=${{ vars.OPENAI_BASE_URL }}
          MAIN_LLM_MODEL=${{ vars.MAIN_LLM_MODEL }}
          NAVER_CLIENT_ID=${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET=${{ secrets.NAVER_CLIENT_SECRET }}
          MILVUS_URL_RECAP=${{ vars.MILVUS_URL_RECAP }}
          MILVUS_DB_NAME_RECAP=${{ vars.MILVUS_DB_NAME_RECAP }}
          MILVUS_COLLECTION_NAME_RECAP=${{ vars.MILVUS_COLLECTION_NAME_RECAP }}
          ALPHA_VANTAGE_API_KEY=${{ secrets.ALPHA_VANTAGE_API_KEY }}
          GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CSE_ID=${{ vars.GOOGLE_CSE_ID }}
          FINANCIAL_API_KEY=${{ secrets.FINANCIAL_API_KEY }}
          LANGFUSE_ENABLED=${{ vars.LANGFUSE_ENABLED }}
          LANGFUSE_SECRET_KEY=${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_PUBLIC_KEY=${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_HOST=${{ vars.LANGFUSE_HOST }}
          EOF
      
    #   - name: Login to GitHub Container Registry
    #     uses: docker/login-action@v2
    #     with:
    #       registry: ghcr.io
    #       username: ${{ github.actor }}
    #       password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and tag Docker images
        run: |
          docker-compose -f docker-compose.prod.yaml build backend-ma
      
      - name: Stop running containers
        run: |
          docker-compose -f docker-compose.prod.yaml down || true
      
      - name: Start Docker Compose services
        run: |
          docker-compose -f docker-compose.prod.yaml up -d --remove-orphans
      
      - name: Check service health
        run: |
          # 서비스가 정상적으로 시작되었는지 확인
          echo "서비스 시작 대기 중..."
          sleep 30
          
          # 헬스체크 재시도 로직
          max_retries=6
          retry_count=0
          health_check_passed=false
          
          while [ $retry_count -lt $max_retries ] && [ "$health_check_passed" = false ]; do
            echo "헬스체크 시도 $((retry_count + 1))/$max_retries"
            
            # 기본 헬스체크
            if health_response=$(curl -s --max-time 10 "http://localhost:8000/api/health"); then
              health_status=$(echo "$health_response" | jq -r '.status // empty')
              
              if [ "$health_status" = "healthy" ]; then
                echo "✓ 기본 헬스체크 통과"
                
                # 추가 기능 테스트 - 루트 엔드포인트 확인
                if root_response=$(curl -s --max-time 10 "http://localhost:8000/api/"); then
                  root_status=$(echo "$root_response" | jq -r '.status // empty')
                  
                  if [ "$root_status" = "online" ]; then
                    echo "✓ API 서비스 온라인 확인"
                    
                    # 상세 헬스체크 수행
                    if detailed_response=$(curl -s --max-time 10 "http://localhost:8000/api/health/detailed"); then
                      detailed_status=$(echo "$detailed_response" | jq -r '.status // empty')
                      
                      if [ "$detailed_status" = "healthy" ]; then
                        echo "✓ 상세 헬스체크 통과"
                        cpu_percent=$(echo "$detailed_response" | jq -r '.system.cpu_percent // "N/A"')
                        memory_percent=$(echo "$detailed_response" | jq -r '.system.memory_percent // "N/A"')
                        openai_configured=$(echo "$detailed_response" | jq -r '.environment.openai_configured // "N/A"')
                        langfuse_enabled=$(echo "$detailed_response" | jq -r '.environment.langfuse_enabled // "N/A"')
                        
                        echo "  - CPU 사용률: ${cpu_percent}%"
                        echo "  - 메모리 사용률: ${memory_percent}%"
                        echo "  - OpenAI 설정: ${openai_configured}"
                        echo "  - Langfuse 활성화: ${langfuse_enabled}"
                        health_check_passed=true
                      else
                        echo "✗ 상세 헬스체크 실패: $detailed_status"
                      fi
                    else
                      echo "⚠ 상세 헬스체크 실패하지만 기본 서비스는 정상"
                      health_check_passed=true
                    fi
                  else
                    echo "✗ API 서비스 상태 이상"
                  fi
                else
                  echo "✗ API 루트 엔드포인트 요청 실패"
                fi
              else
                echo "✗ 헬스체크 실패: $health_status"
              fi
            else
              echo "✗ 헬스체크 요청 실패"
            fi
            
            if [ "$health_check_passed" = false ]; then
              retry_count=$((retry_count + 1))
              if [ $retry_count -lt $max_retries ]; then
                echo "10초 후 재시도..."
                sleep 10
              fi
            fi
          done
          
          if [ "$health_check_passed" = false ]; then
            echo "❌ 서비스 상태 확인 실패 - 로그 출력"
            docker-compose -f docker-compose.prod.yaml logs --tail=50
            exit 1
          fi
          
          echo "✅ 서비스가 정상적으로 배포되었습니다."
      
      - name: Clean up old images
        run: |
          # 사용하지 않는 이미지 정리
          docker image prune -af --filter "until=24h" || true

    
